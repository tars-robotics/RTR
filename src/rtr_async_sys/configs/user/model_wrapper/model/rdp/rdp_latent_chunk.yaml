
_target_: rtr_async_sys.models.reactive_diffusion_policy.policy.latent_chunk_diffusion_unet_image_policy.LatentChunkDiffusionUnetImagePolicy

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    left_wrist_img:
      shape: [3, 240, 320]
      type: rgb
    left_robot_tcp_pose:
      shape: [9]
      type: low_dim
    left_robot_gripper_width:
      shape: [1]
      type: low_dim
    left_gripper1_marker_offset_emb:
      shape: [ 15 ]  # the raw dimension is (63*2), we use PCA to reduce the dimension to 15
      type: low_dim
  extended_obs: # for the AT RNN decoder of the latent diffusion policy
    left_gripper1_marker_offset_emb:
      shape: [ 15 ]  # the raw dimension is (63*2), we use PCA to reduce the dimension to 15
      type: low_dim
  action:
    shape: [10] # (3+6+1) (x, y, z, 6d rotation, gripper_width)

noise_scheduler:
  _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
  num_train_timesteps: 100
  beta_start: 0.0001
  beta_end: 0.02
  # beta_schedule is important
  # this is the best we found
  beta_schedule: squaredcos_cap_v2
  clip_sample: True
  set_alpha_to_one: True
  steps_offset: 0
  prediction_type: epsilon # or sample

obs_encoder:
  _target_: rtr_async_sys.models.reactive_diffusion_policy.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
  shape_meta: *shape_meta # ${shape_meta}
  rgb_model:
    _target_: rtr_async_sys.models.reactive_diffusion_policy.model.vision.model_getter.get_resnet
    name: resnet18
    weights: null
  resize_shape: [240, 320]
  random_transforms:
    - type: RandomCrop
      ratio: 0.90
  use_group_norm: True
  share_rgb_model: False
  imagenet_norm: True

use_latent_action_before_vq: True
at:
  _target_: rtr_async_sys.models.reactive_diffusion_policy.model.vae.model.VAE
  shape_meta: *shape_meta #${shape_meta}
  horizon: 32 #${horizon}
  n_latent_dims: 8
  mlp_layer_num: 1
  use_conv_encoder: True
  conv_latent_dims: 32
  conv_layer_num: 1
  use_rnn_decoder: True
  rnn_latent_dims: 32
  rnn_layer_num: 1
  use_vq: False
  n_embed: 16
  vqvae_groups: 4
  eval: true
  load_dir: null
  act_scale: 1

horizon: 32
n_action_steps: 8 #${eval:'${n_action_steps}+${n_latency_steps}'} # n_latency_steps is 0, n_action_steps is 8
n_obs_steps: 2
num_inference_steps: 100
obs_as_global_cond: True
# crop_shape: null
diffusion_step_embed_dim: 128
down_dims: [512, 1024, 2048]
kernel_size: 5 # dummy, will be overridden by reactive_diffusion_policy/policy/latent_diffusion_unet_image_policy.py
n_groups: 8
cond_predict_scale: True
vae_compress_ratio: 1
# dataset_obs_temporal_downsample_ratio: 2