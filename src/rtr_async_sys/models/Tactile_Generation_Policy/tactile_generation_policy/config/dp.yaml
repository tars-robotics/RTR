defaults:
  - task: wipe

name: train_dp

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

# horizon: 4
horizon: 16
n_obs_steps: 2
# n_action_steps: 3
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  _target_: tactile_generation_policy.policy.dp.DP
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true
  
  diffusion_step_embed_dim: 128
  down_dims:
  - 512
  - 1024
  - 2048
  encoder_output_dim: 64
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: sample

  obs_encoder:
    _target_: tactile_generation_policy.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    rgb_model:
      _target_: tactile_generation_policy.model.vision.model_getter.get_resnet
      name: resnet18
      weights: null # or r3m
    resize_shape: null
    crop_shape: null
    random_crop: False
    # crop_shape: [76, 76]
    # constant center crop
    # random_crop: True
    use_group_norm: True
    share_rgb_model: False
    imagenet_norm: True
  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}



ema:
  _target_: tactile_generation_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  # batch_size: 64
  batch_size: 128
  # batch_size: 256
  # batch_size: 512
  # batch_size: 1024
  num_workers: 8
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

# resume: True
resume: False

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: ${resume}
  lr_scheduler: cosine
  lr_warmup_steps: 500
  # num_epochs: 3000
  # num_epochs: 300
  # num_epochs: 20
  num_epochs: 500
  # num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 100
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${name}_${task_name}
  project: dp3
  resume: ${resume}
  tags:
  - dp3

use_keyframe_actions: False


checkpoint:
  save_ckpt: True # if True, save checkpoint every checkpoint_every
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True # this only saves when save_ckpt is True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
