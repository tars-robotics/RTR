horizon: 48
n_obs_steps: 1
dataset_obs_temporal_downsample_ratio: 1

policy:
  horizon: ${horizon}
  n_latent_dims: 24
  hidden_dim: 128
  downsample_factor: 2
  blocks_per_level: 3
  kernel_size: 5
  kl_multiplier: 1e-6
  n_embed: 20
  eval: false
  act_scale: 1.0
  # Compatibility fields for the latent-DP workspace, which was
  # originally written around reactive_diffusion_policy.model.vae.model.VAE.
  mlp_layer_num: 1
  use_conv_encoder: True
  conv_latent_dims: 128
  conv_layer_num: 1
  use_rnn_decoder: False
  rnn_latent_dims: 32
  rnn_layer_num: 1
  use_vq: False
  vqvae_groups: 4
